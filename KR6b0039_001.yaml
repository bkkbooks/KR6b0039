body:
  text: 失譯人名今附秦録如是我聞一時佛住摩伽提國寂滅道場彌加女村自在天祠精舍時有迦波利婆羅門子名彌勒軀體金色三十二相八十種好放銀光明黃金校飾如白銀山威光無量來至佛所爾時世尊與千二百五十比丘經行林中又有結髮梵志五百人等遙見彌勒威儀庠序相好清淨五體投地如銀山崩成金花聚衆寶間廁金花金臺七寶為果於臺閣中有妙音聲而説偈言我見牟尼尊面貌常清淨百福相奇特世間無倫匹煩惱垢永盡智慧悉成滿一向常歸命身心無疲倦故我以五體欲得勝安樂脫苦無所畏敬禮釋迦文時諸梵志見聞此事白佛言世尊如此童子威儀庠序光明無量與佛無異於何佛所初發道心受持誰經唯願天尊為我解説佛告式乾梵志汝今諦聽善思念之吾當為汝分別解説令汝歡喜乃往過去無量無邊阿僧祇劫時有世界名勝花敷佛號彌勒恆以慈心四無量法教化一切彼佛説經名慈三昧光大悲海雲若有聞者即得超越百億萬劫生死之罪必得成佛無有疑慮時彼國中有大婆羅門名一切智光明聰慧多智廣博衆經世間技藝六十四能無不綜練聞佛出世説慈三昧光大悲海雲經即以世間一切義論難詰彼佛盡其辭辨而不能屈即便信伏為佛弟子尋發阿耨多羅三藐三菩提心而作是言我今於佛法中誦持大慈三昧光大悲海雲經以此功德願於未來過算數劫必得成佛而號彌勒於是捨家即入深山長髮為相修行梵行八千歲中少欲無事乞食自活誦持是經一心除亂彼時世間有雨星現國王淫荒彗星橫流連雨不止洪水暴漲仙人端坐不得乞食經歷七日時彼林中有五百白兔有一兔王母子二獸見於仙人七日不食而作是言今此仙人為佛道故不食多日命不云遠法幢將崩法海將竭我今當為無上大法令得久住不惜身命即告諸兔一切諸行皆悉無常衆生愛身空生空死未曾為法我今欲為一切衆生作大橋梁令法久住供養法師爾時兔王即為群兔而説偈言若有畜生類得聞諸佛名永離三惡道不生八難處若聞法奉行生處常值佛信法無疑惑歸依賢聖僧隨順諸戒行如是疾得佛必至大涅槃常受無上樂爾時兔王説此偈已告諸兔言我今以身欲供養法汝等宜當各各隨喜所以者何我從多劫喪身無數三毒所使為鳥獸形唐生唐死未曾為法吾今欲為無上法故棄捨身命供養法師時山樹神即積香薪以火然之兔王母子圍繞仙人足滿七匝白言大師我今為法供養尊者仙人告言汝是畜生雖有慈心何緣能辦兔白仙人我自以身供養仁者為法久住令諸衆生得饒益故作此語已即語其子汝可隨意求覓水草繫心思惟正念三寶爾時兔子聞母所説跪白母言如尊所説無上大法欲供養者我亦願樂作此語已自投火中母隨後入當於菩薩捨身之時天地大動乃至色界及以諸天皆雨天華持用供養肉熟之後時山樹神白仙人言兔王母子為供養故投身火中今肉已熟汝可食之時彼仙人聞樹神語悲不能言以所誦經書置樹葉又説偈曰寧當然身破眼目不忍行殺食衆生諸佛所説慈悲經彼經中説行慈者寧破骨髓出頭腦不忍噉肉食衆生如佛所説食肉者此人行慈不滿足常受短命多病身迷沒生死不成佛時彼仙人説此偈已因發誓言願我世世不起殺想恆不噉肉入白光明慈三昧乃至成佛制斷肉戒作此語已自投火坑與兔併命是時天地六種震動天神力故樹放光明金色晃曜照千國土時彼國中諸人民等見金色光從山樹出尋光來至既見仙人及以二兔死在火中見所説偈并得佛經持還上王王聞此法傳告共宣令聞此者皆發無上正真道心佛告式乾汝今當知爾時白兔王者今現我身釋迦文尼佛是時兔兒者今羅睺羅是時誦經仙人者今此衆中婆羅門子彌勒菩薩摩訶薩是我涅槃後五十六億萬歲當於穰佉轉輪聖王國土華林園中金剛座處龍華菩提樹下得成佛道轉妙法輪時五百群兔者今摩訶迦葉等五百比丘是時二百五十山樹神者舍利弗目犍連等二百五十比丘是時千國王跋陀婆羅等千菩薩是彼王國土諸人民等得聞經者從我出世乃至樓至於其中間受法弟子得道者是佛告式乾菩薩求法勤苦歷劫不惜身命雖復從報受畜生身常能為法不惜軀命投於火坑以身供養便得超越九百萬億劫生死之罪於是得在恆河沙等無量諸佛先先彌勒前得成佛道汝等云何不勤為法佛説是語時式乾等五百梵志求佛出家佛言善來鬚髮自落即成沙門佛為説法豁然意解成阿羅漢八萬諸天亦發阿耨多羅三藐三菩提心時會大衆聞佛所説各各稱讚菩薩所行舍利弗白佛言時彼仙人投火坑已為生何處佛告舍利弗時彼仙人投火坑已生於梵世普為一切説大梵法乃至成佛轉大梵輪所説經典亦名慈三昧光大悲海雲所制波羅提木叉不行慈者名犯禁人其食肉者犯於重禁後身生處常飲熱銅至彼仙人得作佛時如彌勒菩薩下生經説尊者阿難聞佛所説即從坐起偏袒右肩右膝著地合掌向佛叉手長跪而白佛言世尊彌勒成佛所説戒法乃以慈心制不食肉為犯重禁甚奇甚特時會大衆異口同音皆共稱讚彼國衆生不食肉戒願生彼國世尊悉記當得往生尊者阿難復白佛言當何名此經云何受持之佛告阿難此法之要名白兔王菩薩不惜身命為無上道亦名一切智光明仙人慈心因緣不食肉經如是受持尊者阿難及諸比丘聞佛所説歡喜奉行
